<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kermit's Leap 🐸</title>
<meta property="og:title" content="Kermit's Leap 🐸">
<meta property="og:description" content="Jump. Collect flies. Don't fall. It's not easy being green.">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Kermit's Leap 🐸 — Can you beat my score?">
<meta name="twitter:description" content="The most important frog game of our time. Free to play.">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#071510;font-family:'Nunito',sans-serif;color:#e8f5e9;touch-action:none;user-select:none;-webkit-tap-highlight-color:transparent}
#wrap{position:relative;width:100vw;height:100vh;max-width:480px;margin:0 auto;overflow:hidden}
canvas{display:block;width:100%;height:100%}

/* HUD */
#hud{position:absolute;top:0;left:0;width:100%;display:none;justify-content:space-between;padding:14px 16px 0;pointer-events:none;z-index:10}
.hud-pill{background:rgba(0,0,0,0.55);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:6px 16px;text-align:center;backdrop-filter:blur(6px)}
.hud-label{font-size:9px;font-weight:800;letter-spacing:2.5px;color:#81c784;text-transform:uppercase}
.hud-val{font-family:'Fredoka One',cursive;font-size:30px;line-height:1.1;color:#fff}
.hud-val.gold{color:#FFD700}
#combo{position:absolute;top:80px;left:50%;transform:translateX(-50%);font-family:'Fredoka One',cursive;font-size:20px;color:#FFD700;text-shadow:0 0 12px #FFD70088;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;z-index:10}
#powerups{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);display:flex;gap:8px;pointer-events:none;z-index:10}
.pu{width:38px;height:38px;border-radius:10px;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:20px;opacity:0;transform:scale(0.8);transition:opacity .3s,transform .3s}
.pu.on{opacity:1;transform:scale(1)}
#tap-hint{position:absolute;bottom:72px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:800;letter-spacing:2px;color:rgba(255,255,255,0.3);pointer-events:none;z-index:10;animation:breathe 2s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:.3}50%{opacity:.7}}

/* SCREENS */
.screen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:rgba(5,18,10,0.9);backdrop-filter:blur(8px);padding:24px;gap:0}
.screen.off{display:none}

/* START */
#s-start .frog{font-size:80px;animation:bob 1.5s ease-in-out infinite;line-height:1;filter:drop-shadow(0 6px 20px #4CAF5066)}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-16px) rotate(4deg)}}
#s-start h1{font-family:'Fredoka One',cursive;font-size:clamp(36px,9vw,54px);color:#7fff80;letter-spacing:2px;text-shadow:0 0 24px #4CAF5055,0 3px 0 #1a5c1a;margin:10px 0 2px}
#s-start .sub{font-size:12px;font-weight:700;color:#81c784;letter-spacing:2.5px;margin-bottom:24px;opacity:.8}
.how{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:12px 20px;margin-bottom:22px;width:100%;max-width:300px}
.how-row{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:700;color:#b2dfdb;padding:4px 0}
.how-row span:first-child{font-size:18px;width:24px;text-align:center}

/* BUTTONS */
.btn{font-family:'Fredoka One',cursive;border:none;cursor:pointer;border-radius:50px;letter-spacing:1px;transition:transform .1s,filter .1s;display:inline-flex;align-items:center;justify-content:center;gap:6px;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(0.94)!important}
.btn-green{background:linear-gradient(160deg,#4CAF50,#2e7d32);color:#fff;font-size:20px;padding:15px 48px;box-shadow:0 5px 0 #1b5e20,0 0 24px #4CAF5033;margin-bottom:10px}
.btn-green:hover{filter:brightness(1.1);transform:translateY(-2px)}
.btn-ghost{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);color:#b2dfdb;font-size:14px;padding:10px 26px;font-family:'Nunito',sans-serif;font-weight:800}
.btn-ghost:hover{background:rgba(255,255,255,0.12)}
.btn-x{background:linear-gradient(160deg,#1d9bf0,#0a6eab);color:#fff;font-size:17px;padding:13px 32px;box-shadow:0 4px 0 #084f7a}
.btn-x:hover{filter:brightness(1.1);transform:translateY(-2px)}
.btn-red{background:linear-gradient(160deg,#ef5350,#b71c1c);color:#fff;font-size:17px;padding:13px 32px;box-shadow:0 4px 0 #7f0000}

/* DEATH */
#s-death .frog-dead{font-size:60px;margin-bottom:4px;animation:deadfall .5s ease forwards}
@keyframes deadfall{from{transform:rotate(0) scale(1.4);opacity:0}to{transform:rotate(12deg) scale(1);opacity:1}}
#s-death .score-lbl{font-size:10px;font-weight:800;letter-spacing:3px;color:#81c784;text-transform:uppercase;margin-top:4px}
#s-death .score-num{font-family:'Fredoka One',cursive;font-size:76px;color:#FFD700;line-height:1;text-shadow:0 0 24px #FFD70055,0 4px 0 #9a7800;animation:popIn .4s cubic-bezier(.34,1.56,.64,1) .15s both}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.new-best{background:linear-gradient(135deg,#FFD700,#ff9800);color:#1a1000;font-weight:800;font-size:12px;padding:3px 14px;border-radius:20px;letter-spacing:2px;display:none;animation:popIn .5s cubic-bezier(.34,1.56,.64,1) .4s both}
#death-msg{font-size:15px;font-weight:700;color:#b2dfdb;margin:8px 0 4px;text-align:center;animation:fadeUp .4s ease .3s both;max-width:260px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.stat-row{display:flex;gap:0;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;overflow:hidden;margin:10px 0 16px;width:100%;max-width:260px;animation:fadeUp .4s ease .4s both}
.stat{flex:1;text-align:center;padding:10px 0}
.stat+.stat{border-left:1px solid rgba(255,255,255,0.08)}
.stat-v{font-family:'Fredoka One',cursive;font-size:24px;color:#fff}
.stat-l{font-size:9px;font-weight:800;letter-spacing:1.5px;color:#81c784;text-transform:uppercase}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}

/* LEADERBOARD */
#lb{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(5,18,10,0.97);backdrop-filter:blur(10px);z-index:30;display:flex;flex-direction:column;align-items:center;padding:28px 18px 18px;overflow-y:auto}
#lb.off{display:none}
#lb h2{font-family:'Fredoka One',cursive;font-size:32px;color:#FFD700;text-shadow:0 0 16px #FFD70033;margin-bottom:2px}
#lb .lb-sub{font-size:10px;font-weight:800;letter-spacing:2.5px;color:#81c784;margin-bottom:18px}
.name-row{display:flex;gap:8px;width:100%;max-width:340px;margin-bottom:16px}
.name-row input{flex:1;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.15);border-radius:12px;padding:10px 14px;color:#fff;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;outline:none;transition:border-color .2s}
.name-row input:focus{border-color:#81c784}
.name-row input::placeholder{color:rgba(255,255,255,0.2)}
.name-row button{background:#2e7d32;color:#fff;border:none;border-radius:12px;padding:10px 16px;font-weight:800;font-size:13px;cursor:pointer;font-family:'Nunito',sans-serif;white-space:nowrap;letter-spacing:.5px;transition:background .15s}
.name-row button:hover{background:#1b5e20}
#lb-list{width:100%;max-width:340px;margin-bottom:16px}
.lb-row{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.035);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:9px 14px;margin-bottom:7px;transition:background .2s}
.lb-row.me{border-color:#FFD700;background:rgba(255,215,0,0.06)}
.lb-row.top{border-color:#FFD70088;background:rgba(255,215,0,0.1)}
.lb-rank{font-family:'Fredoka One',cursive;font-size:20px;min-width:28px;text-align:center}
.r1{color:#FFD700}.r2{color:#bdbdbd}.r3{color:#cd7f32}
.lb-name{flex:1;font-weight:700;font-size:14px}
.lb-score{font-family:'Fredoka One',cursive;font-size:22px;color:#FFD700}
.lb-empty{color:rgba(255,255,255,0.25);font-size:13px;text-align:center;padding:16px}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-pill"><div class="hud-label">Score</div><div class="hud-val" id="h-score">0</div></div>
    <div class="hud-pill"><div class="hud-label">Best</div><div class="hud-val gold" id="h-best">0</div></div>
  </div>
  <div id="combo"></div>
  <div id="powerups">
    <div class="pu" id="pu-s">🛡️</div>
    <div class="pu" id="pu-m">🧲</div>
    <div class="pu" id="pu-r">🚀</div>
  </div>
  <div id="tap-hint" style="display:none">TAP OR CLICK TO JUMP</div>

  <!-- START -->
  <div class="screen" id="s-start">
    <div class="frog">🐸</div>
    <h1>KERMIT'S LEAP</h1>
    <div class="sub">IT'S NOT EASY BEING GREEN</div>
    <div class="how">
      <div class="how-row"><span>🪰</span><span>Catch flies to score</span></div>
      <div class="how-row"><span>🪵</span><span>Dodge the logs</span></div>
      <div class="how-row"><span>⭐</span><span>Power-up stars help you</span></div>
      <div class="how-row"><span>💛</span><span>Combo streaks = bonus</span></div>
    </div>
    <button class="btn btn-green" id="btn-start">▶ PLAY</button>
    <button class="btn btn-ghost" id="btn-lb-start">🏆 Leaderboard</button>
  </div>

  <!-- DEATH -->
  <div class="screen off" id="s-death">
    <div class="frog-dead">🐸</div>
    <div class="score-lbl">Flies Caught</div>
    <div class="score-num" id="d-score">0</div>
    <div class="new-best" id="d-new">🏆 NEW BEST!</div>
    <div id="death-msg"></div>
    <div class="stat-row">
      <div class="stat"><div class="stat-v" id="d-best">0</div><div class="stat-l">Best</div></div>
      <div class="stat"><div class="stat-v" id="d-jumps">0</div><div class="stat-l">Jumps</div></div>
      <div class="stat"><div class="stat-v" id="d-combo">0</div><div class="stat-l">Combo</div></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-x" id="btn-share">𝕏 Share</button>
      <button class="btn btn-green" id="btn-again">↻ Again</button>
    </div>
    <div class="btn-row" style="margin-top:10px">
      <button class="btn btn-ghost" id="btn-lb-death">🏆 Leaderboard</button>
    </div>
  </div>

  <!-- LEADERBOARD -->
  <div id="lb" class="off">
    <h2>🏆 LEADERBOARD</h2>
    <div class="lb-sub">LOCAL HIGH SCORES</div>
    <div class="name-row">
      <input id="lb-name" type="text" maxlength="12" placeholder="Enter your name..." autocomplete="off" spellcheck="false">
      <button id="lb-save">Save Score</button>
    </div>
    <div id="lb-list"></div>
    <button class="btn btn-ghost" id="btn-lb-close">← Back</button>
  </div>
</div>

<script>
// ─── CANVAS SETUP ───────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('wrap');
let W = 0, H = 0;

function resize() {
  W = wrap.clientWidth;
  H = wrap.clientHeight;
  canvas.width  = W;
  canvas.height = H;
}
resize();
window.addEventListener('resize', resize);

// ─── STATE ──────────────────────────────────────────────────
const S = { IDLE:'idle', PLAY:'play', DEAD:'dead' };
let state = S.IDLE;
let rafId = null;
let tick  = 0;

// Scores / prefs
let scores = [];
try { scores = JSON.parse(localStorage.getItem('kl_scores') || '[]'); } catch(e){}
let playerName = localStorage.getItem('kl_name') || '';
let best = scores.length ? scores[0].score : 0;

// Game vars
let kermit, pads, flies, logs, stars, particles;
let score, jumps, combo, comboTick, bestCombo;
let cameraY;
let shakeAmt = 0;
let shieldOn = false, shieldTick = 0;
let magnetOn = false, magnetTick = 0;
let rocketOn = false, rocketTick = 0;
let trail = [];
let spawnLogAt = 999;

const KR = 20; // kermit radius
const PH = 14; // pad height

// ─── DEATH QUOTES ───────────────────────────────────────────
const QUOTES = [
  "It's not easy being green 💚",
  "Even Kermit has bad days.",
  "Miss Piggy warned you! 🐷",
  "Kermit.exe has stopped working.",
  "The Rainbow Connection... not found.",
  "Have you tried being a pig?",
  "Gonzo would have made it.",
  "Fozzie says: Wocka wocka NOPE.",
  "The swamp claims another victim.",
  "Scooter is filing the incident report.",
  "Fly catchers can't be choosers.",
  "Even tadpoles don't fall this fast.",
];
function quote(s) {
  if (s === 0) return "You didn't even jump 😭";
  return QUOTES[Math.floor(Math.random() * QUOTES.length)];
}

// ─── HELPERS ────────────────────────────────────────────────
function rrect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function rnd(a, b) { return a + Math.random() * (b - a); }

function particles_add(x, y, color, n, spd) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = (spd||2) * rnd(0.6, 1.4);
    particles.push({ x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s - 1.5, a:1, color, r:rnd(2,5), txt:null });
  }
}

function text_add(x, y, txt, color) {
  particles.push({ x, y, vx:0, vy:-2.2, a:1, color, r:0, txt });
}

// ─── INIT ───────────────────────────────────────────────────
function initGame() {
  score = 0; jumps = 0; combo = 0; comboTick = 0; bestCombo = 0;
  shieldOn = false; magnetOn = false; rocketOn = false;
  shieldTick = magnetTick = rocketTick = 0;
  shakeAmt = 0; trail = [];
  particles = []; pads = []; flies = []; logs = []; stars = [];
  tick = 0;

  // Starting pad
  const startY = H * 0.78;
  pads.push({ x:W/2-55, y:startY, w:110, moving:false, shrink:false, dir:1, spd:0, origW:110, bobPhase:0 });

  // Pre-fill pads above
  let lastY = startY;
  for (let i = 0; i < 14; i++) {
    lastY = addPad(lastY, true);
  }

  // Some starting flies
  pads.slice(1, 8).forEach(p => {
    if (Math.random() < 0.7) flies.push(makeFly(p));
  });

  cameraY = 0;
  kermit = {
    x: W/2, y: startY - KR - 1,
    vx: 0, vy: 0,
    onGround: true, alive: true,
    squish: 1,
  };

  // First log appears after score 5
  spawnLogAt = 300 + Math.floor(Math.random() * 200);

  document.getElementById('hud').style.display = 'flex';
  document.getElementById('tap-hint').style.display = 'block';
  updateHUD();
}

function addPad(fromY, init) {
  const margin = Math.max(30, W * 0.08);
  const padW   = rnd(55, 95);
  const gapBase = 82;
  const gapExtra = init ? 0 : Math.min(score * 2.5, 55);
  const newY = fromY - gapBase - gapExtra - rnd(0, 30);
  const x    = rnd(margin, W - padW - margin);
  const difficulty = init ? 0 : score;
  const moving  = difficulty > 6  && Math.random() < Math.min(0.12 + difficulty * 0.012, 0.5);
  const shrink  = difficulty > 18 && Math.random() < 0.2;

  pads.push({
    x, y: newY, w: padW,
    moving, shrink, dir: Math.random()<0.5?1:-1,
    spd: rnd(0.6, 1.3),
    origW: padW,
    hasFly: false, bobPhase: Math.random() * Math.PI * 2,
  });
  return newY;
}

function makeFly(pad) {
  return {
    x: pad.x + 8 + Math.random() * Math.max(0, pad.w - 16),
    y: pad.y - rnd(22, 40),
    r: 7, collected: false,
    bobPhase: Math.random() * Math.PI * 2,
    bobSpd: rnd(0.038, 0.06),
  };
}

function makeStar(nearY) {
  const types = ['shield','magnet','rocket'];
  return {
    x: rnd(40, W - 40),
    y: nearY - rnd(30, 120),
    r: 12, collected: false,
    type: types[Math.floor(Math.random() * 3)],
    bobPhase: Math.random() * Math.PI * 2,
    rot: 0,
  };
}

function makeLog() {
  const fromRight = Math.random() < 0.5;
  const lw = rnd(70, 130);
  const difficulty = Math.min(score * 0.06, 2.5);
  return {
    x: fromRight ? W + lw : -lw,
    y: kermit.y - rnd(H * 0.25, H * 0.55),
    w: lw, dir: fromRight ? -1 : 1,
    spd: rnd(1.3, 2.2) + difficulty,
  };
}

// ─── JUMP ───────────────────────────────────────────────────
function jump() {
  if (state !== S.PLAY || !kermit || !kermit.alive) return;
  kermit.vy  = rocketOn ? -17 : -13.5;
  kermit.vx  = rnd(-1.5, 1.5);
  kermit.onGround = false;
  kermit.squish   = 0.62;
  jumps++;
  particles_add(kermit.x, kermit.y + KR, '#a5d6a7', 7);
  document.getElementById('tap-hint').style.display = 'none';
}

// ─── MAIN LOOP ──────────────────────────────────────────────
function loop() {
  if (state !== S.PLAY) return; // hard stop
  rafId = requestAnimationFrame(loop);
  tick++;

  // Screen shake
  let sx = 0, sy = 0;
  if (shakeAmt > 0.3) {
    sx = (Math.random()-0.5) * shakeAmt;
    sy = (Math.random()-0.5) * shakeAmt;
    shakeAmt *= 0.75;
  } else {
    shakeAmt = 0;
  }

  // Draw BG
  drawBG(sx, sy);

  // Camera
  const camTarget = kermit.y - H * 0.52;
  if (camTarget < cameraY) cameraY += (camTarget - cameraY) * 0.1;

  ctx.save();
  ctx.translate(sx, sy - cameraY);

  // ── SPAWN ──
  // Extend pads upward
  const topY = pads.reduce((m, p) => Math.min(m, p.y), Infinity);
  if (topY > kermit.y - H) {
    addPad(topY, false);
  }

  // Flies on unvisited pads
  pads.forEach(p => {
    if (!p.hasFly && p.y < kermit.y - 40) {
      p.hasFly = true;
      if (Math.random() < 0.62) flies.push(makeFly(p));
    }
  });

  // Stars
  if (tick % 320 === 0 && Math.random() < 0.5) {
    stars.push(makeStar(kermit.y - H * 0.4));
  }

  // Logs
  if (score >= 5) {
    if (tick >= spawnLogAt) {
      logs.push(makeLog());
      spawnLogAt = tick + Math.max(200 - score * 4, 80) + Math.floor(Math.random() * 100);
    }
  }

  // ── PADS ──
  pads.forEach(p => {
    if (p.moving) {
      p.x += p.dir * p.spd;
      const m = 16;
      if (p.x < m || p.x + p.w > W - m) p.dir *= -1;
    }
    if (p.shrink) {
      p.w -= 0.12;
      if (p.w < p.origW * 0.38) p.w = p.origW;
    }
    drawPad(p);
  });
  // Cull far-below pads
  pads = pads.filter(p => p.y < kermit.y + H * 0.7);

  // ── LOGS ──
  logs.forEach(log => {
    log.x += log.dir * log.spd;
    drawLog(log);
    if (kermit.alive) {
      const hit =
        kermit.x + KR*0.65 > log.x &&
        kermit.x - KR*0.65 < log.x + log.w &&
        kermit.y + KR*0.85 > log.y &&
        kermit.y - KR*0.85 < log.y + 18;
      if (hit) {
        if (shieldOn) {
          shieldOn = false; shieldTick = 0;
          particles_add(kermit.x, kermit.y, '#4fc3f7', 18, 3);
          text_add(kermit.x, kermit.y - 30, 'BLOCKED!', '#4fc3f7');
          shakeAmt = 5;
        } else {
          kermit.vy = -7; kermit.vx = log.dir * 4.5;
          kermit.onGround = false;
          combo = 0;
          particles_add(kermit.x, kermit.y, '#ff7043', 14, 2.5);
          shakeAmt = 10;
        }
      }
    }
  });
  logs = logs.filter(l => l.x > -l.w - 20 && l.x < W + l.w + 20);

  // ── FLIES ──
  flies.forEach(fly => {
    fly.bobPhase += fly.bobSpd;
    const fy = fly.y + Math.sin(fly.bobPhase) * 5;
    if (!fly.collected) {
      if (magnetOn) {
        const dx = kermit.x - fly.x, dy = kermit.y - fly.y;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < 170 && d > 1) { fly.x += dx/d * 5; fly.y += dy/d * 5; }
      }
      drawFly(fly.x, fy);
      const dx = kermit.x - fly.x, dy = kermit.y - fy;
      if (Math.sqrt(dx*dx + dy*dy) < KR + fly.r + 5) {
        fly.collected = true;
        score++;
        combo++;
        comboTick = 130;
        if (combo > bestCombo) bestCombo = combo;
        if (score > best) best = score;
        particles_add(fly.x, fy, '#FFD700', 14, 2);
        if (combo >= 4) text_add(fly.x, fy - 22, combo + 'x COMBO!', '#FFD700');
        updateHUD();
      }
    }
  });
  flies = flies.filter(f => !f.collected && f.y < kermit.y + H * 0.8);

  // ── STARS ──
  stars.forEach(star => {
    star.bobPhase += 0.035;
    star.rot      += 0.045;
    const sy2 = star.y + Math.sin(star.bobPhase) * 6;
    if (!star.collected) {
      drawStar(star.x, sy2, star.rot, star.type);
      const dx = kermit.x - star.x, dy = kermit.y - sy2;
      if (Math.sqrt(dx*dx + dy*dy) < KR + star.r + 5) {
        star.collected = true;
        activatePU(star.type);
      }
    }
  });
  stars = stars.filter(s => !s.collected && s.y < kermit.y + H * 0.8);

  // ── PHYSICS ──
  kermit.vy += 0.52;
  if (kermit.vy > 18) kermit.vy = 18;
  kermit.y  += kermit.vy;
  kermit.x  += kermit.vx;
  kermit.vx *= 0.91;
  kermit.x = Math.max(KR, Math.min(W - KR, kermit.x));
  kermit.squish += (1 - kermit.squish) * 0.13;
  if (rocketOn) kermit.vy = Math.min(kermit.vy, -2.5);

  // Rocket trail
  if (rocketOn) {
    trail.push({ x:kermit.x, y:kermit.y + KR, a:1 });
    if (trail.length > 14) trail.shift();
  } else {
    trail = [];
  }
  trail.forEach((tr, i) => {
    ctx.globalAlpha = tr.a * (i / trail.length) * 0.7;
    ctx.fillStyle = '#ff9800';
    ctx.beginPath();
    ctx.arc(tr.x, tr.y, (i / trail.length) * 9, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Land on pads
  if (kermit.vy >= 0) {
    kermit.onGround = false;
    for (const p of pads) {
      const within =
        kermit.x + KR * 0.55 > p.x &&
        kermit.x - KR * 0.55 < p.x + p.w &&
        kermit.y + KR       > p.y &&
        kermit.y + KR       < p.y + PH + 16;
      if (within) {
        kermit.y = p.y - KR;
        kermit.vy = 0;
        kermit.vx *= 0.6;
        kermit.onGround = true;
        kermit.squish   = 0.7;
        particles_add(kermit.x, kermit.y + KR, '#a5d6a7', 4, 1);
        break;
      }
    }
  }

  // Power-up timers
  if (shieldOn && --shieldTick <= 0) shieldOn = false;
  if (magnetOn && --magnetTick <= 0) magnetOn = false;
  if (rocketOn && --rocketTick <= 0) rocketOn = false;
  updatePUui();

  // Combo timer
  if (comboTick > 0 && --comboTick === 0) combo = 0;
  updateComboUI();

  // Draw Kermit
  drawKermit();

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.a -= p.txt ? 0.02 : 0.032;
    if (p.a <= 0) { particles.splice(i, 1); continue; }
    if (!p.txt) { p.vy += 0.1; }
    ctx.globalAlpha = Math.max(0, p.a);
    if (p.txt) {
      ctx.fillStyle = p.color;
      ctx.font = 'bold 18px "Fredoka One",cursive';
      ctx.textAlign = 'center';
      ctx.fillText(p.txt, p.x, p.y);
      ctx.textAlign = 'left';
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;

  ctx.restore();

  // Death check — safe: use a counted max instead of spread
  let lowestPadY = -Infinity;
  for (const p of pads) { if (p.y > lowestPadY) lowestPadY = p.y; }
  if (kermit.alive && kermit.y > lowestPadY + H * 0.38 && !shieldOn) {
    die();
  }
}

// ─── DRAW ───────────────────────────────────────────────────
function drawBG(sx, sy) {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#050f08');
  g.addColorStop(1, '#0a2210');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Subtle water ripples
  ctx.save();
  ctx.translate(sx, sy);
  for (let i = 0; i < 7; i++) {
    const ry = ((i * 88 + tick * 0.35) % (H + 20)) - 10;
    const al = 0.02 + Math.sin(tick * 0.025 + i) * 0.01;
    ctx.strokeStyle = `rgba(100,220,140,${al})`;
    ctx.lineWidth = 0.7;
    ctx.beginPath(); ctx.moveTo(0, ry); ctx.lineTo(W, ry); ctx.stroke();
  }
  ctx.restore();
}

function drawPad(p) {
  // Drop shadow
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath();
  ctx.ellipse(p.x + p.w/2, p.y + PH + 5, p.w/2, 4, 0, 0, Math.PI*2);
  ctx.fill();

  // Body
  const moving = p.moving, shrink = p.shrink;
  ctx.fillStyle = shrink ? '#7cb342' : moving ? '#2ecc71' : '#388e3c';
  rrect(p.x, p.y, p.w, PH, PH/2);
  ctx.fill();

  // Shine
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  rrect(p.x + 5, p.y + 3, p.w - 10, 4, 2);
  ctx.fill();

  // Flower on wide pads
  if (p.w > 88 && !p.shrink) {
    const fx = p.x + p.w/2, fy = p.y - 7;
    ctx.fillStyle = '#f48fb1';
    for (let i = 0; i < 5; i++) {
      const a = (i/5)*Math.PI*2;
      ctx.beginPath();
      ctx.ellipse(fx + Math.cos(a)*5, fy + Math.sin(a)*5, 4, 2.5, a, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.fillStyle = '#fffde7';
    ctx.beginPath(); ctx.arc(fx, fy, 3, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawLog(log) {
  ctx.save();
  ctx.fillStyle = '#6d4c41';
  rrect(log.x, log.y, log.w, 18, 9);
  ctx.fill();
  ctx.fillStyle = '#8d6e63';
  rrect(log.x + 5, log.y + 4, log.w - 10, 5, 2);
  ctx.fill();
  ctx.fillStyle = '#5d4037';
  ctx.beginPath();
  ctx.ellipse(log.x + log.w * 0.38, log.y + 9, 7, 5, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawFly(x, y) {
  ctx.save();
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath(); ctx.ellipse(x, y, 7, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(180,220,255,0.72)';
  ctx.beginPath(); ctx.ellipse(x-6, y-3, 6, 3.5, -0.4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+6, y-3, 6, 3.5,  0.4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ef5350';
  ctx.beginPath(); ctx.arc(x-2, y-1, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+2, y-1, 1.5, 0, Math.PI*2); ctx.fill();
  // Soft glow
  ctx.fillStyle = 'rgba(255,235,80,0.1)';
  ctx.beginPath(); ctx.arc(x, y, 13, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawStar(x, y, rot, type) {
  ctx.save(); ctx.translate(x, y); ctx.rotate(rot);
  const emoji = type==='shield'?'🛡️':type==='magnet'?'🧲':'🚀';
  ctx.font = '24px serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(emoji, 0, 0);
  ctx.strokeStyle = `rgba(255,215,0,${0.35 + Math.sin(tick*0.1)*0.2})`;
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(0, 0, 18 + Math.sin(tick*0.08)*3, 0, Math.PI*2); ctx.stroke();
  ctx.restore();
}

function drawKermit() {
  const k = kermit;
  ctx.save();
  ctx.translate(k.x, k.y);
  const sy = k.squish, sx = 2 - sy;
  ctx.scale(sx, sy);
  const R = KR;

  // Shield ring
  if (shieldOn) {
    ctx.strokeStyle = `rgba(79,195,247,${0.45+Math.sin(tick*0.18)*0.3})`;
    ctx.lineWidth = 3;
    ctx.setLineDash([6,4]);
    ctx.beginPath(); ctx.arc(0, 0, R+9, 0, Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
  }

  // Body
  ctx.fillStyle = '#4CAF50';
  ctx.beginPath(); ctx.ellipse(0, 0, R, R, 0, 0, Math.PI*2); ctx.fill();

  // Belly
  ctx.fillStyle = '#c8e6c9';
  ctx.beginPath(); ctx.ellipse(0, 5, R*0.52, R*0.48, 0, 0, Math.PI*2); ctx.fill();

  // Eyes
  const ex = 9, ey = -11;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(-ex, ey, 9, 7.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( ex, ey, 9, 7.5, 0, 0, Math.PI*2); ctx.fill();

  // Pupils (blink periodically)
  const blink = (Math.floor(tick/210) % 9 === 0) ? 0.07 : 1;
  ctx.fillStyle = '#1b2a1b';
  ctx.beginPath(); ctx.ellipse(-ex+1, ey, 4.5, 5.8*blink, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( ex+1, ey, 4.5, 5.8*blink, 0, 0, Math.PI*2); ctx.fill();

  // Highlights
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-ex+3, ey-2, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( ex+3, ey-2, 2, 0, Math.PI*2); ctx.fill();

  // Nostrils
  ctx.fillStyle = '#388e3c';
  ctx.beginPath(); ctx.arc(-5, -2, 2.2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( 5, -2, 2.2, 0, Math.PI*2); ctx.fill();

  // Mouth
  ctx.strokeStyle = '#1b3a1b'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
  ctx.beginPath();
  if (!k.onGround && k.vy > 3) {
    ctx.arc(0, 11, 7, Math.PI*0.12, Math.PI*0.88); // worried
  } else {
    ctx.arc(0, 5, 9, Math.PI*0.12, Math.PI*0.88);   // smile
  }
  ctx.stroke();

  // Legs in air
  if (!k.onGround) {
    const lw = Math.sin(tick * 0.28) * 11;
    ctx.strokeStyle = '#388e3c'; ctx.lineWidth = 5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(-10,R-4); ctx.quadraticCurveTo(-20,R+7+lw,-22,R+14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo( 10,R-4); ctx.quadraticCurveTo( 20,R+7-lw, 22,R+14); ctx.stroke();
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(-R+4,2); ctx.quadraticCurveTo(-R-9,-3+lw/2,-R-6,-11); ctx.stroke();
    ctx.beginPath(); ctx.moveTo( R-4,2); ctx.quadraticCurveTo( R+9,-3-lw/2, R+6,-11); ctx.stroke();
  }

  ctx.restore();
}

// ─── HUD ────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('h-score').textContent = score;
  document.getElementById('h-best').textContent  = best;
}

function updateComboUI() {
  const el = document.getElementById('combo');
  if (combo >= 3 && comboTick > 0) {
    el.textContent = combo + 'x COMBO 🔥';
    el.style.opacity = '1';
  } else {
    el.style.opacity = '0';
  }
}

function updatePUui() {
  document.getElementById('pu-s').className = 'pu' + (shieldOn?' on':'');
  document.getElementById('pu-m').className = 'pu' + (magnetOn?' on':'');
  document.getElementById('pu-r').className = 'pu' + (rocketOn?' on':'');
}

// ─── POWER-UPS ──────────────────────────────────────────────
function activatePU(type) {
  particles_add(kermit.x, kermit.y, '#FFD700', 20, 3);
  const labels = {shield:'SHIELD!',magnet:'MAGNET!',rocket:'ROCKET!'};
  text_add(kermit.x, kermit.y - 34, labels[type], '#FFD700');
  if (type==='shield') { shieldOn=true; shieldTick=360; }
  if (type==='magnet') { magnetOn=true; magnetTick=480; }
  if (type==='rocket') { rocketOn=true; rocketTick=280; kermit.vy=-16; }
}

// ─── DIE ────────────────────────────────────────────────────
function die() {
  state = S.DEAD;
  kermit.alive = false;
  cancelAnimationFrame(rafId); rafId = null;
  document.getElementById('hud').style.display = 'none';
  document.getElementById('tap-hint').style.display = 'none';
  document.getElementById('powerups').querySelectorAll('.pu').forEach(e => e.className='pu');

  setTimeout(() => {
    const isNew = score > 0 && score >= best;
    document.getElementById('d-score').textContent = score;
    document.getElementById('d-best').textContent  = best;
    document.getElementById('d-jumps').textContent = jumps;
    document.getElementById('d-combo').textContent = bestCombo;
    document.getElementById('death-msg').textContent = quote(score);
    document.getElementById('d-new').style.display = isNew ? 'inline-block' : 'none';
    document.getElementById('s-death').classList.remove('off');
    if (score > 0 && playerName) saveScore(playerName, score);
  }, 450);
}

// ─── START / RESTART ────────────────────────────────────────
function startGame() {
  cancelAnimationFrame(rafId); rafId = null;
  state = S.PLAY;
  document.getElementById('s-start').classList.add('off');
  document.getElementById('s-death').classList.add('off');
  initGame();
  loop();
}

// ─── LEADERBOARD ────────────────────────────────────────────
function saveScore(name, s) {
  scores.push({ name: name.slice(0,12) || 'Anonymous', score: s });
  scores.sort((a,b) => b.score - a.score);
  scores = scores.slice(0, 10);
  try { localStorage.setItem('kl_scores', JSON.stringify(scores)); } catch(e){}
  best = scores.length ? scores[0].score : best;
}

function renderLB(myScore) {
  const list = document.getElementById('lb-list');
  if (!scores.length) {
    list.innerHTML = '<div class="lb-empty">No scores yet. Be the first! 🐸</div>';
    return;
  }
  const medals = ['🥇','🥈','🥉'];
  let html = '';
  scores.forEach((s, i) => {
    const isMe = myScore !== undefined && i === scores.findIndex(x => x.score === myScore && x.name === playerName);
    html += `<div class="lb-row ${i===0?'top':''} ${isMe?'me':''}">
      <div class="lb-rank ${i<3?'r'+(i+1):''}">${i<3?medals[i]:i+1}</div>
      <div class="lb-name">${esc(s.name)}${isMe?' ← you':''}</div>
      <div class="lb-score">${s.score}</div>
    </div>`;
  });
  list.innerHTML = html;
}

function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function openLB(myScore) {
  document.getElementById('lb-name').value = playerName;
  renderLB(myScore);
  document.getElementById('lb').classList.remove('off');
}

function closeLB() {
  document.getElementById('lb').classList.add('off');
}

// ─── EVENTS ─────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code==='Space'||e.code==='ArrowUp') { e.preventDefault(); jump(); }
});
canvas.addEventListener('click', jump);
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, {passive:false});

document.getElementById('btn-start').addEventListener('click', startGame);
document.getElementById('btn-again').addEventListener('click', startGame);

document.getElementById('btn-share').addEventListener('click', () => {
  const texts = [
    `🐸 I caught ${score} flies in Kermit's Leap! It's not easy being green 💚 Can you beat me? #KermitLeap`,
    `Just got ${score} in Kermit's Leap 🐸🪰 Kermit would be proud. Miss Piggy, not so much. #KermitLeap`,
    `${score} flies caught. ${jumps} jumps. 0 regrets. 🐸 #KermitLeap`,
    `I lasted ${jumps} jumps and caught ${score} flies in Kermit's Leap. It's giving chaos. 🐸 #KermitLeap`,
  ];
  const t = texts[Math.floor(Math.random()*texts.length)];
  window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(t)+'&url='+encodeURIComponent('https://thyghos.github.io/kermitsleap/'), '_blank');
});

document.getElementById('btn-lb-start').addEventListener('click', () => openLB(undefined));
document.getElementById('btn-lb-death').addEventListener('click', () => openLB(score));
document.getElementById('btn-lb-close').addEventListener('click', closeLB);

document.getElementById('lb-save').addEventListener('click', () => {
  const name = document.getElementById('lb-name').value.trim();
  if (!name) return;
  playerName = name;
  try { localStorage.setItem('kl_name', name); } catch(e){}
  if (score > 0) saveScore(name, score);
  renderLB(score);
});
document.getElementById('lb-name').addEventListener('keydown', e => {
  if (e.key==='Enter') document.getElementById('lb-save').click();
});
</script>
